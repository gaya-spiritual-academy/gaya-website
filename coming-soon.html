<html lang="zh">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal-deep: #1B5F75; --teal-bright: #2AACB8; --teal-pale: #E3F6F8;
      --gold: #C9A227; --gold-dark: #9A7A18;
      --text-dark: #0E2A33; --text-mid: #3A6070; --text-soft: #7AADBE;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Jost', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: linear-gradient(150deg, #EBF8FA 0%, #F4FAFB 55%, #FFFDF5 100%);
      color: var(--text-dark); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 40px 24px; overflow: hidden;
    }
    .bg-grid {
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(42,172,184,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(42,172,184,0.05) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }
    .bg-glow {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 60% 40%, rgba(42,172,184,0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .content { position: relative; z-index: 2; max-width: 560px; }
    .diamond { font-size: 2.5rem; color: var(--gold); margin-bottom: 32px; display: block; animation: glow 3s ease-in-out infinite; }
    @keyframes glow { 0%,100%{text-shadow:0 0 20px rgba(201,162,39,0.2);opacity:0.7} 50%{text-shadow:0 0 48px rgba(201,162,39,0.6);opacity:1} }
    .eyebrow { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: var(--teal-bright); margin-bottom: 20px; }
    h1 { font-family: var(--font-display); font-size: clamp(2.4rem, 6vw, 3.8rem); font-weight: 300; line-height: 1.15; color: var(--text-dark); margin-bottom: 8px; }
    h1 em { font-style: italic; color: var(--teal-bright); }
    .subtitle { font-family: var(--font-display); font-size: 1rem; color: var(--text-soft); margin-bottom: 32px; }
    .divider { width: 48px; height: 2px; background: linear-gradient(90deg, var(--teal-bright), var(--gold)); margin: 0 auto 32px; border-radius: 2px; }
    .message { font-size: 0.95rem; color: var(--text-mid); line-height: 1.9; margin-bottom: 48px; font-weight: 300; }
    .actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-back { display: inline-flex; align-items: center; gap: 8px; padding: 13px 28px; background: var(--teal-bright); color: white; font-family: var(--font-body); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; border-radius: 2px; transition: all 0.2s; box-shadow: 0 4px 16px rgba(42,172,184,0.3); }
    .btn-back:hover { background: var(--teal-deep); transform: translateY(-1px); }
    .btn-wa { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; background: transparent; color: var(--teal-deep); font-family: var(--font-body); font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; border: 1.5px solid var(--teal-bright); border-radius: 2px; transition: all 0.2s; }
    .btn-wa:hover { background: var(--teal-pale); }
    .footer-note { position: fixed; bottom: 28px; left: 0; right: 0; text-align: center; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-soft); opacity: 0.5; }
  </style>
</head>
