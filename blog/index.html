    .blog-hero {
      min-height: 58vh; display: flex; align-items: flex-end;
      position: relative; overflow: hidden;
      padding-top: var(--nav-h); background: #071E27;
    }
    .blog-hero-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
      opacity: 0.25; filter: saturate(0.5) brightness(0.65);
    }
    .blog-hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(42,172,184,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42,172,184,0.07) 1px, transparent 1px);
      background-size: 56px 56px;
    }
    .blog-hero-glow {
      position: absolute; inset: 0;
      background:

        radial-gradient(ellipse at 15% 100%, rgba(42,172,184,0.2) 0%, transparent 50%);
    }
    .blog-hero-overlay {
      position: absolute; bottom: 0; left: 0; right: 0; height: 60%;
      background: linear-gradient(to top, #071E27 0%, transparent 100%);
    }
    .blog-hero-inner {
      position: relative; z-index: 2; width: 100%;
      max-width: var(--container); margin: 0 auto;
      padding: clamp(48px,6vw,80px) clamp(20px,4vw,60px);
    }
    .blog-eyebrow {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 12px;
      opacity: 0; animation: fadeUp 0.8s 0.1s var(--ease) forwards;
    }
    .blog-eyebrow::before { content:''; width:28px; height:1.5px; background:var(--gold); }
    .blog-hero-title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 300; line-height: 1.05; color: white; margin-bottom: 14px;
      opacity: 0; animation: fadeUp 0.9s 0.25s var(--ease) forwards;
    }
    .blog-hero-title em { font-style: italic; color: var(--teal-bright); }
    .blog-hero-sub {
      font-size: 1rem; color: rgba(255,255,255,0.45);
      font-weight: 300; max-width: 500px; line-height: 1.8;
      opacity: 0; animation: fadeUp 0.9s 0.4s var(--ease) forwards;
    }

    /* ══════════ FEATURED ══════════ */

      background: white;
      padding: clamp(60px,7vw,96px) 0 0;
    }
    .blog-section-label {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--teal-bright);

      display: flex; align-items: center; gap: 12px;
    }
    .blog-section-label::before { content:''; width:28px; height:1.5px; background:var(--teal-bright); }

    .featured-card {
      display: grid; grid-template-columns: 1fr 1fr;
      border: 1px solid rgba(42,172,184,0.12);
      border-radius: 4px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(27,95,117,0.08);
      transition: box-shadow 0.3s var(--ease), transform 0.3s var(--ease);
      text-decoration: none; color: inherit;
      margin-bottom: clamp(56px,7vw,96px);
    }
    .featured-card:hover { box-shadow: 0 24px 64px rgba(27,95,117,0.15); transform: translateY(-4px); }
    @media (max-width: 768px) { .featured-card { grid-template-columns: 1fr; } }

    .featured-img-wrap { position: relative; overflow: hidden; min-height: 400px; }
    @media (max-width: 768px) { .featured-img-wrap { min-height: 240px; } }

      filter: saturate(0.75) brightness(0.88);
      transition: transform 0.7s var(--ease), filter 0.4s;

    .featured-img-overlay {
      position: absolute; inset: 0;

    .featured-date { font-size: 0.72rem; color: var(--text-soft); }
    .featured-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 3vw, 2.6rem);

    .featured-excerpt {

    }
    .featured-author {

      padding-top: 20px; border-top: 1px solid rgba(42,172,184,0.1);
    }
    .featured-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      object-fit: cover; object-position: top;
      border: 2px solid rgba(42,172,184,0.25);
    }
    .featured-author-name { font-size: 0.8rem; font-weight: 500; color: var(--teal-deep); }
    .featured-read {

    .featured-card:hover .featured-read { gap: 10px; color: var(--teal-bright); }

    /* ══════════ CTA ══════════ */

      z-index: 9999; text-decoration: none; transition: transform 0.25s var(--ease);
      overflow: hidden;
    }
    .wa-float:hover { transform: scale(1.1); }
    .wa-float svg { width: 28px !important; height: 28px !important; flex-shrink: 0; }

<script>
  renderNav('../');
  renderFooter('../');

  // Render featured (latest post) + all posts grid
  renderBlogGrid('blog-grid', '../', { featured: true });

  // Scroll reveal
  const ro = new IntersectionObserver(entries => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) {
        setTimeout(() => e.target.classList.add('visible'), i * 80);
        ro.unobserve(e.target);
      }
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(el => ro.observe(el));
</script>
